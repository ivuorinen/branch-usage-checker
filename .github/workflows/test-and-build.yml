name: Test & Build

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [created]

jobs:
  build-phar:
    runs-on: ubuntu-latest
    name: Build PHAR
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ matrix.php }}
          ini-values: phar.readonly=0
          extensions: fileinfo
          tools: composer:v2
          coverage: pcov

      - name: Setup Problem Matches
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: PHPUnit Testing
        run: vendor/bin/pest --coverage

      - name: Copy application to phar
        run: cp application application.phar

      - name: Build PHAR
        run: php application app:build branch-usage-checker --build-version

      # Smoke test
      - name: Ensure the PHAR works
        run: builds/branch-usage-checker --version

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload the PHAR artifact
        with:
          name: branch-usage-checker
          path: builds/branch-usage-checker

  publish-phar:
    runs-on: ubuntu-latest
    name: Publish the PHAR
    needs:
      - "build-phar"
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: branch-usage-checker
          path: builds/

      - name: Upload box.phar
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: builds/branch-usage-checker
